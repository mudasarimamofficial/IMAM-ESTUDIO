<style>
        body { background-color: #000000; color: #ffffff; }
        .ambient-shadow { box-shadow: 0 4px 60px rgba(0, 0, 0, 0.15); }

        .precision-border { border: 1px solid #222222; }
        .input-precision { background-color: #0A0A0A; border: 1px solid #222222; color: #ffffff; transition: border-color 0.2s; }
        .input-precision:focus { border-color: #ffffff; outline: none; }
        .btn-primary { background-color: #ffffff; color: #000000; border: none; min-height: 44px; transition: transform 0.1s, opacity 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: transparent; border: 1px solid #222222; color: #ffffff; min-height: 44px; transition: background-color 0.2s, border-color 0.2s; }

<body class="min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<div class="w-full max-w-md" id="login-step">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">IMAM ESTUDIO</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-2 uppercase">Client Portal Access</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-lg p-8 ambient-shadow">
<h2 class="font-headline-lg text-headline-lg mb-6 text-primary">Sign In</h2>
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); show2FA();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<input class="input-precision rounded w-full px-4 py-3 font-body-md text-body-md" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Reset</a>
</div>
<input class="input-precision rounded w-full px-4 py-3 font-body-md text-body-md" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-2">
<button class="btn-primary rounded font-label-md text-label-md w-full flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-[#222222]"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-outline-variant">OR</span>
<div class="flex-grow border-t border-[#222222]"></div>
</div>
<button class="btn-secondary rounded font-label-md text-label-md w-full flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">auto_awesome</span>
<span>Use Magic Link</span>
</button>
</div>
</form>
</div>
<div class="text-center mt-6">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                Secure access for authorized personnel only.
            </p>
</div>
</div>
<!-- 2FA Modal (Hidden by default) -->
<div class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" id="2fa-modal">
<div class="glass-panel rounded-lg p-8 max-w-md w-full ambient-shadow transform transition-all">
<div class="flex justify-between items-start mb-6">
<div>
<h3 class="font-headline-md text-headline-md text-primary">Two-Factor Authentication</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-2">Enter the code sent to your device.</p>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors" onclick="hide2FA()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); alert('Authentication Successful');">
<!-- Code Input Container -->
<div class="flex gap-3 justify-center mb-2">
<input autofocus="" class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
<span class="flex items-center text-outline-variant">-</span>
<input class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center input-precision rounded font-headline-md text-headline-md" maxlength="1" type="text"/>
</div>
<button class="btn-primary rounded font-label-md text-label-md w-full" type="submit">
                    Verify Identity
                </button>
<div class="text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Resend Code</a>
</div>
</form>
</div>
</div>
<script>
        function show2FA() {
            document.getElementById('2fa-modal').classList.remove('hidden');
            // Auto-focus first input when modal opens
            setTimeout(() => {
                const firstInput = document.querySelector('#2fa-modal input[type="text"]');
                if(firstInput) firstInput.focus();
            }, 100);
        }

        function hide2FA() {
            document.getElementById('2fa-modal').classList.add('hidden');
        }

        // Basic auto-advance for 2FA inputs
        const inputs = document.querySelectorAll('#2fa-modal input[type="text"]');
        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length >= 1) {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
